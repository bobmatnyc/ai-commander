[mypy]
# Minimal mypy configuration for QA test scripts
python_version = 3.11
warn_return_any = True
warn_unused_configs = True
disallow_untyped_defs = False
ignore_missing_imports = True

# Exclude test scripts from strict checking
[mypy-qa_test_gui]
ignore_errors = True

[mypy-qa_ui_component_test]
ignore_errors = True
